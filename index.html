<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Browser tab aur Google search me ye title dikhega. -->
  <title>Saurabh Raj | Python Full Stack Developer</title>

  <!-- Google search result me title ke niche description dikhegi. -->
  <meta name="description"
    content="Saurabh Raj is a Python Full Stack Developer skilled in React.js, Django, JavaScript, SQL, and modern web development. Explore my portfolio, projects, skills, and experience." />

  <!-- WhatsApp, LinkedIn, Facebook par share karoge to ye title dikhega. -->
  <meta property="og:title" content="Saurabh Raj | Python Full Stack Developer" />

  <!-- Share karne par description dikhegi. -->
  <meta property="og:description"
    content="Explore my portfolio showcasing React.js, Python, Django, SQL projects, skills, and experience." />

  <!-- Batata hai ki ye ek website hai. -->
  <meta property="og:type" content="website" />

  <!-- Share karne par thumbnail image dikhegi. -->
  <meta property="og:image" content="/portfolio-preview.webp" />

  <!-- Robots  -->
  <meta name="robots" content="index, follow">

  <!-- Domain -->
  <meta property="og:url" content="https://saurabhrajportfolio.netlify.app" />

  <!-- Icon import krne ka link -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/fonts/remixicon.css" rel="stylesheet">

  <!-- Font style import -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />

</head>



<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
